# `buf generate` plugin configuration. Run `make proto` to regenerate.
version: v2
plugins:
  - local: protoc-gen-go
    out: api/proto
    opt:
      - paths=source_relative
  - local: protoc-gen-go-grpc
    out: api/proto
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false
inputs:
  - directory: api/proto
