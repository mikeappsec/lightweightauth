# Plain CRDs for envtest (no helm templating).
#
# Mirrors deploy/helm/lightweightauth/templates/crds.yaml minus the
# `{{- if ... }}` wrappers, label include, and resource-policy
# annotation. Kept in sync manually; the schema is permissive
# (x-kubernetes-preserve-unknown-fields) so additions on either side
# don't drift behaviourally.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: authconfigs.lightweightauth.io
spec:
  group: lightweightauth.io
  scope: Namespaced
  names:
    kind: AuthConfig
    listKind: AuthConfigList
    singular: authconfig
    plural: authconfigs
    shortNames: ["ac"]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                ready:
                  type: boolean
                observedGeneration:
                  type: integer
                  format: int64
                message:
                  type: string
              x-kubernetes-preserve-unknown-fields: true
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: authpolicies.lightweightauth.io
spec:
  group: lightweightauth.io
  scope: Namespaced
  names:
    kind: AuthPolicy
    listKind: AuthPolicyList
    singular: authpolicy
    plural: authpolicies
    shortNames: ["ap"]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: identityproviders.lightweightauth.io
spec:
  group: lightweightauth.io
  scope: Cluster
  names:
    kind: IdentityProvider
    listKind: IdentityProviderList
    singular: identityprovider
    plural: identityproviders
    shortNames: ["idp"]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
