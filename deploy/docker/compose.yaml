# docker compose -f deploy/docker/compose.yaml up
#
# Spins up:
#   - envoy        the data-plane proxy (Envoy 1.37.x, public image)
#   - lwauth       the auth service (built from this repo's root Dockerfile)
#   - echo         a tiny upstream the proxy forwards allowed traffic to
#
# Hardened-image support (dhi.io/envoy) is deferred to a later milestone.
#
# Local URLs:
#   curl -i http://localhost:8000/             # via Envoy
#   curl -i http://localhost:8080/healthz      # lwauth direct

name: lightweightauth-dev

services:
  envoy:
    image: envoyproxy/envoy:v1.37.2
    command:
      - "-c"
      - "/etc/envoy/envoy.yaml"
      - "--log-level"
      - "info"
    ports:
      - "8000:8000"   # ingress
      - "9901:9901"   # admin
    volumes:
      - ../envoy/sample.yaml:/etc/envoy/envoy.yaml:ro
    depends_on:
      lwauth:
        condition: service_healthy
      echo:
        condition: service_started
    networks: [ mesh ]

  lwauth:
    build:
      context: ../..
      dockerfile: Dockerfile
    command:
      - "--config=/etc/lwauth/config.yaml"
      - "--http-addr=:8080"
      - "--grpc-addr=:9001"
    ports:
      - "8080:8080"
      - "9001:9001"
    volumes:
      - ../../examples/dev-local.yaml:/etc/lwauth/config.yaml:ro
    healthcheck:
      test: ["CMD", "/usr/local/bin/lwauthctl", "validate", "--config", "/etc/lwauth/config.yaml"]
      interval: 5s
      timeout: 2s
      retries: 5
    networks: [ mesh ]

  echo:
    image: ealen/echo-server:0.9.2
    environment:
      PORT: "8080"
    networks:
      mesh:
        aliases: [ app ]   # matches `address: app` in deploy/envoy/sample.yaml

networks:
  mesh:
    driver: bridge
