# values.yaml — lightweightauth (M4)
#
# The chart now supports two operational modes:
#
#   1. file-mode (default): an inline AuthConfig is mounted via ConfigMap
#      and reloaded on change (fsnotify, set `config.watch: true`).
#   2. CRD-mode: the controller watches an AuthConfig CR in
#      `controller.watchNamespace` and hot-swaps the engine on each
#      reconcile. Enable with `controller.enabled: true` and install the
#      CRDs with `crds.install: true`.
#
# Multi-replica is fine in either mode; M4 keeps a single-replica
# file-replacement model (no leader election yet — that's M11).

replicaCount: 2

image:
  repository: ghcr.io/mikeappsec/lightweightauth
  tag: ""           # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP
  httpPort: 8080
  grpcPort: 9001

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# ---------------------------------------------------------------------------
# Configuration source
# ---------------------------------------------------------------------------
config:
  # Inline AuthConfig YAML mounted at /etc/lwauth/config.yaml.
  # Ignored when controller.enabled is true.
  inline: |
    identifiers: []
    authorizers: []
  # Reload on ConfigMap change via fsnotify (file-mode only).
  watch: true

# ---------------------------------------------------------------------------
# CRD installation
# ---------------------------------------------------------------------------
crds:
  install: true
  keep: true

# ---------------------------------------------------------------------------
# Controller (CRD-mode)
# ---------------------------------------------------------------------------
controller:
  enabled: false
  watchNamespace: ""
  authConfigName: default

# ---------------------------------------------------------------------------
# ServiceAccount + RBAC
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true

# ---------------------------------------------------------------------------
# Scaling + availability
# ---------------------------------------------------------------------------
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: ""

# ---------------------------------------------------------------------------
# Network policy
# ---------------------------------------------------------------------------
networkPolicy:
  # Default-on: a fresh install with no allowedFrom selectors blocks
  # ingress entirely, which is the safe failure mode. Operators flip
  # the namespaceSelectors / podSelectors below to admit their mesh
  # or callers. Set to false only for ephemeral dev clusters where
  # NetworkPolicy isn't enforced.
  enabled: true
  allowedFrom:
    namespaceSelectors: []
    podSelectors: []

# ---------------------------------------------------------------------------
# Gateway (optional Envoy ext_authz proxy)
# ---------------------------------------------------------------------------
# When `gateway.enabled` is true the chart renders a small Envoy
# Deployment + Service + ConfigMap configured to call lwauth's gRPC
# ext_authz endpoint and forward allowed traffic to a single upstream
# Service. This replaces ~60 lines of hand-rolled Envoy YAML in the
# cookbook recipe and keeps two things consistent that operators
# typically get wrong:
#
#   1. `failure_mode_allow: false` — fail closed if lwauth is down.
#   2. HTTP/2 to lwauth — ext_authz is gRPC; without explicit h2 the
#      proxy speaks HTTP/1.1 and every Check call returns UNAVAILABLE.
#
# The gateway Pod is automatically admitted to lwauth's NetworkPolicy
# (no need to add a podSelector under networkPolicy.allowedFrom) and
# its labels are stable across releases:
#
#     app.kubernetes.io/name: lightweightauth
#     app.kubernetes.io/instance: <release>
#     app.kubernetes.io/component: gateway
#
# so you can target it from your own NetworkPolicy on the upstream.
# `examples/cookbook/gate-upstream-service/netpol-backend.yaml`
# is the worked example.
gateway:
  enabled: false

  # Required when enabled: the in-cluster Service the gateway forwards
  # to. `service` is mandatory; `port` defaults to 8000.
  upstream:
    service: ""
    port: 8000
    # type: STRICT_DNS | LOGICAL_DNS — leave default unless you have a
    # reason; STRICT_DNS plays well with kube-dns + ClusterIP.
    type: STRICT_DNS
    connectTimeout: 1s

  image:
    repository: envoyproxy/envoy
    # Pin to a specific patch version for reproducible deployments.
    # Override with a digest (e.g. "v1.32.3@sha256:...") for maximum
    # supply-chain assurance in production.
    tag: v1.32.3
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: ClusterIP
    port: 80

  # Tunables for the ext_authz filter. Defaults match the cookbook's
  # production-grade config. Do NOT set failureModeAllow=true unless
  # you understand that it turns lwauth outages into authorization
  # bypasses.
  extAuthz:
    failureModeAllow: false
    timeout: 0.25s

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

  # logLevel passes straight to envoy's --log-level flag.
  logLevel: warn

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ---------------------------------------------------------------------------
# Pod / container security context
# ---------------------------------------------------------------------------
# Defaults satisfy the "restricted" Pod Security Admission profile
# (https://kubernetes.io/docs/concepts/security/pod-security-standards/).
# Override individual fields to fit your platform; do NOT downgrade
# without a documented reason.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532          # nonroot
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: RuntimeDefault

# ---------------------------------------------------------------------------
# RBAC scope
# ---------------------------------------------------------------------------
# When controller.enabled and controller.watchNamespace is set, prefer
# a namespace-scoped Role/RoleBinding for AuthConfig + AuthPolicy over
# a ClusterRole. Cluster-scope is only required when watching across
# namespaces (watchNamespace=="").
#
# IdentityProvider is a cluster-scoped CRD; the chart always emits a
# small ClusterRole granting list/watch on it regardless of this flag,
# because a namespace Role cannot grant access to cluster-scoped
# resources. Set identityProviderClusterRole.enabled=false if you want
# to bind that permission yourself out-of-band.
controllerRBAC:
  preferNamespaceScope: true
  identityProviderClusterRole:
    enabled: true

# ---------------------------------------------------------------------------
# Metrics + observability
# ---------------------------------------------------------------------------
metrics:
  enabled: true
  serviceMonitor: false
