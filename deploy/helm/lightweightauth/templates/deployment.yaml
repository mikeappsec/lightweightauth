apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lwauth.fullname" . }}
  labels:
    {{- include "lwauth.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "lwauth.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lwauth.selectorLabels" . | nindent 8 }}
      annotations:
        {{- if not .Values.controller.enabled }}
        # Force pod restart on inline-config change. fsnotify covers
        # in-place reloads; this is a belt-and-braces hash for clusters
        # that ship config out-of-band.
        checksum/config: {{ .Values.config.inline | sha256sum }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "lwauth.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: lwauth
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            - --http-addr=:{{ .Values.service.httpPort }}
            {{- if .Values.controller.enabled }}
            - --watch-namespace={{ .Values.controller.watchNamespace | default .Release.Namespace }}
            - --authconfig-name={{ .Values.controller.authConfigName }}
            {{- else }}
            - --config=/etc/lwauth/config.yaml
            {{- if .Values.config.watch }}
            - --watch-config-file
            {{- end }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.httpPort }}
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
          readinessProbe:
            httpGet: { path: /readyz, port: http }
          livenessProbe:
            httpGet: { path: /healthz, port: http }
          resources: {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            # /tmp must be writable even with readOnlyRootFilesystem so
            # the kernel + Go runtime have a scratch area for spill files.
            - name: tmp
              mountPath: /tmp
            {{- if not .Values.controller.enabled }}
            - name: config
              mountPath: /etc/lwauth
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if not .Values.controller.enabled }}
        - name: config
          configMap:
            name: {{ include "lwauth.fullname" . }}-config
        {{- end }}
---
{{- if not .Values.controller.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lwauth.fullname" . }}-config
  labels:
    {{- include "lwauth.labels" . | nindent 4 }}
data:
  config.yaml: |
{{ .Values.config.inline | indent 4 }}
---
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "lwauth.fullname" . }}
  labels:
    {{- include "lwauth.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "lwauth.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
    - name: grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: grpc
