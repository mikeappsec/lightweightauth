{{- if .Values.crds.install }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: authconfigs.lightweightauth.io
  {{- if .Values.crds.keep }}
  annotations:
    "helm.sh/resource-policy": keep
  {{- end }}
  labels:
    {{- include "lwauth.labels" . | nindent 4 }}
spec:
  group: lightweightauth.io
  scope: Namespaced
  names:
    kind: AuthConfig
    listKind: AuthConfigList
    singular: authconfig
    plural: authconfigs
    shortNames: ["ac"]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                ready:
                  type: boolean
                observedGeneration:
                  type: integer
                  format: int64
                message:
                  type: string
              x-kubernetes-preserve-unknown-fields: true
      additionalPrinterColumns:
        - name: Ready
          type: boolean
          jsonPath: .status.ready
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: authpolicies.lightweightauth.io
  {{- if .Values.crds.keep }}
  annotations:
    "helm.sh/resource-policy": keep
  {{- end }}
  labels:
    {{- include "lwauth.labels" . | nindent 4 }}
spec:
  group: lightweightauth.io
  scope: Namespaced
  names:
    kind: AuthPolicy
    listKind: AuthPolicyList
    singular: authpolicy
    plural: authpolicies
    shortNames: ["ap"]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: identityproviders.lightweightauth.io
  {{- if .Values.crds.keep }}
  annotations:
    "helm.sh/resource-policy": keep
  {{- end }}
  labels:
    {{- include "lwauth.labels" . | nindent 4 }}
spec:
  group: lightweightauth.io
  scope: Cluster
  names:
    kind: IdentityProvider
    listKind: IdentityProviderList
    singular: identityprovider
    plural: identityproviders
    shortNames: ["idp"]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
{{- end }}
