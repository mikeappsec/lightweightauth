{{- /*
NetworkPolicy: only Envoy / mesh / explicit peers can dial lwauth.
Default-on. When no allowedFrom selectors are configured we render
`ingress: []` — Kubernetes treats that as deny-all, which is the
documented safe failure mode. An ingress rule containing only `ports`
with an empty/missing `from` would instead match ALL sources, the
opposite of what operators expect, so we never emit that shape.

To admit callers, set networkPolicy.allowedFrom.namespaceSelectors
and/or networkPolicy.allowedFrom.podSelectors. To turn the policy off
entirely (e.g. dev clusters without a CNI that enforces NetworkPolicy)
set networkPolicy.enabled: false.
*/}}
{{- if .Values.networkPolicy.enabled }}
{{- $nsSel := .Values.networkPolicy.allowedFrom.namespaceSelectors -}}
{{- $podSel := .Values.networkPolicy.allowedFrom.podSelectors -}}
{{- /*
When the chart's own gateway is enabled, auto-admit it. Without this
every operator who flips gateway.enabled=true also has to remember to
add a matching podSelector under networkPolicy.allowedFrom — the most
common foot-gun in the cookbook before this lived in the chart.
*/ -}}
{{- $gwSel := list -}}
{{- if .Values.gateway.enabled -}}
{{- $gwSel = list (dict
  "app.kubernetes.io/name" "lightweightauth"
  "app.kubernetes.io/instance" .Release.Name
  "app.kubernetes.io/component" "gateway"
) -}}
{{- end -}}
{{- $hasPeers := or (or (gt (len $nsSel) 0) (gt (len $podSel) 0)) (gt (len $gwSel) 0) -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: lightweightauth
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes: [Ingress]
  {{- if $hasPeers }}
  ingress:
    - from:
        {{- range $nsSel }}
        - namespaceSelector:
            matchLabels:
              {{- toYaml . | nindent 14 }}
        {{- end }}
        {{- range $podSel }}
        - podSelector:
            matchLabels:
              {{- toYaml . | nindent 14 }}
        {{- end }}
        {{- range $gwSel }}
        - podSelector:
            matchLabels:
              {{- toYaml . | nindent 14 }}
        {{- end }}
      ports:
        - port: {{ $.Values.service.httpPort }}
          protocol: TCP
        - port: {{ $.Values.service.grpcPort }}
          protocol: TCP
  {{- else }}
  # No allowedFrom selectors configured -> deny-all ingress.
  # Set networkPolicy.allowedFrom.namespaceSelectors or .podSelectors
  # to admit callers (or set gateway.enabled=true and the chart's
  # own gateway will be admitted automatically).
  ingress: []
  {{- end }}
{{- end }}
---
{{- if and .Values.metrics.serviceMonitor .Values.metrics.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: lightweightauth
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: lightweightauth
      app.kubernetes.io/instance: {{ .Release.Name }}
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
{{- end }}
