{{- /*
Optional Envoy ext_authz gateway. See values.yaml `gateway` block for
the user-facing knobs and rationale.

The gateway is opt-in (gateway.enabled=false by default). When enabled
it renders a ConfigMap (envoy.yaml), Deployment, and Service. The
companion lwauth NetworkPolicy template auto-admits this Pod's
selector so operators don't have to repeat it under
`networkPolicy.allowedFrom`.

We never inline-template inside envoy.yaml itself; it's emitted via
toYaml + a tightly-scoped fmt for the upstream coordinates only,
which keeps the indentation predictable and makes the rendered
manifest greppable.
*/ -}}
{{- if .Values.gateway.enabled -}}
{{- if not .Values.gateway.upstream.service -}}
{{- fail "gateway.enabled=true requires gateway.upstream.service to be set (the in-cluster Service the gateway forwards to)." -}}
{{- end -}}
{{- $up := .Values.gateway.upstream -}}
{{- $extAuthz := .Values.gateway.extAuthz -}}
{{- $lwauthSvc := printf "%s.%s.svc.cluster.local" .Release.Name .Release.Namespace -}}
{{- $upstreamHost := printf "%s.%s.svc.cluster.local" $up.service .Release.Namespace -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-gateway
  labels:
    {{- include "lwauth.gatewayLabels" . | nindent 4 }}
data:
  envoy.yaml: |
    static_resources:
      listeners:
      - name: ingress
        address: { socket_address: { address: 0.0.0.0, port_value: 80 } }
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: ingress
              codec_type: AUTO
              route_config:
                name: local
                virtual_hosts:
                - name: upstream
                  domains: ["*"]
                  routes:
                  - match: { prefix: "/" }
                    route: { cluster: upstream }
              http_filters:
              - name: envoy.filters.http.ext_authz
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                  transport_api_version: V3
                  failure_mode_allow: {{ $extAuthz.failureModeAllow }}
                  clear_route_cache: true
                  grpc_service:
                    envoy_grpc: { cluster_name: lwauth }
                    timeout: {{ $extAuthz.timeout }}
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
      - name: upstream
        type: {{ $up.type }}
        connect_timeout: {{ $up.connectTimeout }}
        load_assignment:
          cluster_name: upstream
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: {{ $upstreamHost }}
                    port_value: {{ $up.port }}
      - name: lwauth
        type: STRICT_DNS
        connect_timeout: 1s
        # ext_authz is gRPC, which requires HTTP/2. Without this Envoy
        # speaks HTTP/1.1 to lwauth and every Check call returns
        # UNAVAILABLE. This is the single most common ext_authz
        # misconfig we see in the wild, so the chart hard-codes it.
        typed_extension_protocol_options:
          envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
            "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
            explicit_http_config: { http2_protocol_options: {} }
        load_assignment:
          cluster_name: lwauth
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: {{ $lwauthSvc }}
                    port_value: {{ .Values.service.grpcPort }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-gateway
  labels:
    {{- include "lwauth.gatewayLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "lwauth.gatewaySelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lwauth.gatewayLabels" . | nindent 8 }}
      {{- with .Values.gateway.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.gateway.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gateway.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gateway.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: envoy
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          args:
            - "-c"
            - "/etc/envoy/envoy.yaml"
            - "--log-level"
            - {{ .Values.gateway.logLevel | quote }}
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            tcpSocket: { port: 80 }
            initialDelaySeconds: 1
            periodSeconds: 5
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          volumeMounts:
            - name: cfg
              mountPath: /etc/envoy
              readOnly: true
      volumes:
        - name: cfg
          configMap:
            name: {{ .Release.Name }}-gateway
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-gateway
  labels:
    {{- include "lwauth.gatewayLabels" . | nindent 4 }}
spec:
  type: {{ .Values.gateway.service.type }}
  selector:
    {{- include "lwauth.gatewaySelectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.gateway.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
