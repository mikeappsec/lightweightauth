name: pci-dss-baseline
version: "1.0.0"
description: >
  PCI-DSS v4.0 baseline policy bundle — enforces strong authentication,
  session controls, and audit logging requirements for cardholder data
  environments. Maps to PCI-DSS requirements 7 (access control),
  8 (identification and authentication), and 10 (logging and monitoring).
keywords:
  - pci-dss
  - compliance
  - payments
  - cardholder-data
author: LightweightAuth Contributors
license: Apache-2.0
policies:
  - policies/strong-auth.yaml
  - policies/session-controls.yaml
  - policies/audit-logging.yaml
