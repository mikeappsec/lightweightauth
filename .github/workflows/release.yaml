# Release workflow — triggered on semver tag push (v*).
#
# Produces:
#   1. Cross-compiled Go binaries (linux/amd64, linux/arm64, darwin/arm64)
#      via GoReleaser, uploaded as a GitHub Release with SHA-256 checksums.
#   2. Per-binary SBOMs (SPDX JSON) generated by syft.
#   3. Cosign keyless signatures on the checksums file (Sigstore OIDC).
#   4. Helm OCI chart pushed to ghcr.io/mikeappsec/charts/lightweightauth.
#
# Docker images (stock + FIPS) are produced by build.yaml which already
# triggers on v* tags — this workflow adds the binary/Helm/signing layer.
#
# Security:
#   - All third-party actions pinned by full commit SHA.
#   - Jobs split by least-privilege scope.
#   - Concurrency guard prevents parallel release races.
#   - Tag-on-main verification prevents rogue tag releases.

name: release

on:
  push:
    tags:
      - "v*"

# Prevent parallel releases from racing on the same tag or overlapping tags.
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  CHART_REPO: ghcr.io/mikeappsec/charts

jobs:
  # ------------------------------------------------------------------
  # Job 0: Verify the tag points to a commit on main
  # ------------------------------------------------------------------
  verify-tag:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Verify tag is on main branch
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "ERROR: Tag $GITHUB_REF_NAME does not point to a commit on main."
            echo "Release tags must be created on the main branch."
            exit 1
          fi
          echo "OK: Tag $GITHUB_REF_NAME is on main."

  # ------------------------------------------------------------------
  # Job 1: Build binaries, generate SBOMs, create GitHub Release
  # ------------------------------------------------------------------
  goreleaser:
    runs-on: ubuntu-24.04
    needs: verify-tag
    permissions:
      contents: write   # create release + upload assets
    outputs:
      version: ${{ steps.version.outputs.version }}
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # GoReleaser needs full history for changelog

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5.5.0
        with:
          go-version: "1.26.2"
          cache: true

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # GoReleaser builds cross-platform binaries and creates the
      # GitHub Release with archives and checksums.
      - uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8  # v7.2.1
        id: goreleaser
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Expose checksums as base64-encoded subjects for the SLSA
      # provenance generator (job: provenance).
      - name: Generate SLSA subjects
        id: hash
        run: |
          echo "hashes=$(base64 -w0 dist/checksums.txt)" >> "$GITHUB_OUTPUT"

      # Generate an SBOM for each archive using syft. These are
      # uploaded alongside the release archives so consumers can
      # verify the dependency tree.
      - name: Generate SBOMs (syft)
        uses: anchore/sbom-action@f325610c9f50a54015d37c8d16cb3b0e2c8f4de0  # v0.18.0
        with:
          path: ./dist
          output-file: dist/lightweightauth_${{ steps.version.outputs.version }}.sbom.json
          format: spdx-json

      - name: Upload SBOMs to release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda  # v2.2.1
        with:
          files: dist/*.sbom.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ------------------------------------------------------------------
  # Job 2: Sign release checksums with Cosign (keyless)
  # ------------------------------------------------------------------
  sign:
    runs-on: ubuntu-24.04
    needs: goreleaser
    permissions:
      contents: write   # upload signature files to release
      id-token: write   # mint OIDC token for Sigstore
    steps:
      - name: Download release asset (checksums.txt)
        run: |
          mkdir -p dist
          gh release download "$GITHUB_REF_NAME" --pattern "checksums.txt" --dir dist/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb  # v3.8.0

      - name: Sign checksums with Cosign (keyless)
        run: cosign sign-blob --yes dist/checksums.txt --output-signature dist/checksums.txt.sig --output-certificate dist/checksums.txt.pem

      - name: Upload signature + cert to release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda  # v2.2.1
        with:
          files: |
            dist/checksums.txt.sig
            dist/checksums.txt.pem
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ------------------------------------------------------------------
  # Job 3: SLSA provenance for Go binaries (level 3)
  #
  # NOTE: Pinned by tag (not SHA) because GitHub Actions does not yet
  # support SHA-based refs for reusable workflow `uses:` in all runner
  # versions. Track: https://github.com/actions/runner/issues/2417
  # Expected commit for v2.1.0: 9e8fed3 (verify at each update).
  # ------------------------------------------------------------------
  provenance:
    needs: goreleaser
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.goreleaser.outputs.hashes }}
      upload-assets: true

  # ------------------------------------------------------------------
  # Job 4: Package and push Helm chart as OCI artifact
  # ------------------------------------------------------------------
  helm:
    runs-on: ubuntu-24.04
    needs: goreleaser
    permissions:
      contents: read
      packages: write
      id-token: write   # Cosign chart signing
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112  # v4.3.0
        with:
          version: "v3.16.0"

      - name: Log in to GHCR (Helm OCI)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Update Chart.yaml version from tag
        run: |
          VERSION="${{ needs.goreleaser.outputs.version }}"
          sed -i "s/^version:.*/version: ${VERSION}/" deploy/helm/lightweightauth/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" deploy/helm/lightweightauth/Chart.yaml
          echo "Chart.yaml updated to version ${VERSION}"
          cat deploy/helm/lightweightauth/Chart.yaml

      - name: Package Helm chart
        run: helm package deploy/helm/lightweightauth --destination dist/

      - name: Push Helm chart to OCI registry
        id: helm-push
        run: |
          OUTPUT=$(helm push dist/lightweightauth-${{ needs.goreleaser.outputs.version }}.tgz oci://${{ env.CHART_REPO }} 2>&1)
          echo "$OUTPUT"
          DIGEST=$(echo "$OUTPUT" | grep -oP 'sha256:[a-f0-9]+')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      # Sign the Helm chart OCI artifact with Cosign so consumers can
      # verify the chart was published by this workflow.
      - name: Install Cosign
        uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb  # v3.8.0

      - name: Sign Helm OCI artifact (keyless, by digest)
        run: cosign sign --yes ${{ env.CHART_REPO }}/lightweightauth@${{ steps.helm-push.outputs.digest }}
