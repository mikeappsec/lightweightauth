# Build, test, and push the lwauth image.
#
# Stock build only. Hardened-image build (dhi.io/golang + dhi.io/alpine)
# is deferred to a later milestone.

name: build

on:
  push:
    branches: [ main ]
    tags:     [ "v*" ]
  pull_request:
    branches: [ main ]

permissions:
  contents:        read
  packages:        write
  id-token:        write

env:
  REGISTRY: ghcr.io
  IMAGE:    ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true
      - run: go vet ./...
      - run: go test -race ./...

  build:
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}

  e2e:
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Compose up
        run: docker compose -f deploy/docker/compose.yaml up -d --build --wait
      - name: Smoke test
        run: |
          set -e
          curl -fsS http://localhost:8080/healthz
          curl -fsS -H 'X-Api-Key: dev-admin-key' http://localhost:8000/x | head
      - name: Compose logs (on failure)
        if: failure()
        run: docker compose -f deploy/docker/compose.yaml logs
      - name: Compose down
        if: always()
        run: docker compose -f deploy/docker/compose.yaml down -v
