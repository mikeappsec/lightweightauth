# Site identity ---------------------------------------------------------------
site_name: LightweightAuth
site_description: >-
  Pluggable identification, authorization, and response-mutation pipeline for
  HTTP and gRPC. Single binary; embeddable Go library; Envoy ext_authz adapter.
site_url: https://mikeappsec.github.io/lightweightauth/
repo_url: https://github.com/mikeappsec/lightweightauth
repo_name: mikeappsec/lightweightauth
edit_uri: edit/main/docs/

# Where the docs live --------------------------------------------------------
docs_dir: docs
site_dir: site

# Theme ----------------------------------------------------------------------
# mkdocs-material is chosen over Hugo because (a) it is Python-only — no
# extra toolchain in CI beyond what the controller already builds against;
# (b) it consumes Markdown directly so docs/modules/*.md and
# docs/cookbook/*.md need no front-matter rewrites; (c) the navigation,
# admonition, and code-block features below are stock theme behaviour and
# do not require theme overrides we'd then have to maintain.
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - content.code.copy
    - content.action.edit
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

plugins:
  - search

# Files outside the published surface ----------------------------------------
# Internal pentest artifacts never ship: a contributor who drops a
# `PENTEST_REPORT_*.md` under docs/ during a review must not have it
# auto-published just because they forgot to gitignore it. The pattern
# is matched against the docs_dir-relative path.
exclude_docs: |
  **/PENTEST_REPORT_*.md

# Validation policy ----------------------------------------------------------
# Strict by default: any unresolved nav entry, broken in-docs link, or
# orphan file fails the build. Source-tree references (Go files, proto
# files, deploy manifests) are linked as absolute https://github.com/...
# URLs so they resolve identically on the rendered site and on GitHub;
# this lets us keep the strictest policy without paying the false-
# positive tax that the relative `../../pkg/...` style used to cost.
validation:
  nav:
    omitted_files: warn  # surfaced in dev; promoted by --strict in CI
    not_found: warn
    absolute_links: warn
  links:
    not_found: warn
    absolute_links: warn
    unrecognized_links: warn
    anchors: warn

# Navigation ------------------------------------------------------------------
# The nav is hand-curated rather than auto-discovered so a new file under
# docs/ does not silently appear in production navigation. Anything not
# listed here is reachable via search but not surfaced in the side rail.
nav:
  - Home: index.md
  - Quickstart: QUICKSTART.md
  - Cookbook:
      - cookbook/README.md
      - Gate an upstream service through lwauth: cookbook/gate-upstream-service.md
      - Istio + lwauth + RBAC for gRPC: cookbook/istio-grpc-rbac.md
      - OpenFGA on existing Envoy: cookbook/openfga-on-envoy.md
      - Rotate HMAC secrets without downtime: cookbook/rotate-hmac.md
  - Modules:
      - modules/README.md
      - Identifiers:
          - JWT: modules/jwt.md
          - OAuth2 introspection: modules/oauth2-introspection.md
          - OAuth2 (browser flow): modules/oauth2.md
          - API key: modules/apikey.md
          - mTLS / SPIFFE: modules/mtls.md
          - HMAC (SigV4-style): modules/hmac.md
          - DPoP wrapper: modules/dpop.md
          - gRPC plugin: modules/plugin-grpc.md
      - Authorizers:
          - RBAC: modules/rbac.md
          - CEL: modules/cel.md
          - OPA: modules/opa.md
          - OpenFGA: modules/openfga.md
          - Composite: modules/composite.md
      - Response mutators:
          - Header add: modules/header-add.md
          - Header remove: modules/header-remove.md
          - Header passthrough: modules/header-passthrough.md
          - JWT issue: modules/jwt-issue.md
      - Cache backends:
          - In-process memory: modules/cache-memory.md
          - Valkey: modules/cache-valkey.md
      - Cross-cutting:
          - Rate limit: modules/ratelimit.md
          - Session: modules/session.md
          - Upstream guard: modules/upstream.md
          - ConfigStream broker: modules/configstream.md
          - Observability: modules/observability.md
  - Architecture:
      - Design: DESIGN.md
      - Architecture overview: ARCHITECTURE.md
      - HTTP / gRPC API: API.md
      - Milestones: MILESTONES.md
  - Operations:
      - Deployment: DEPLOYMENT.md
      - Envoy integration: deployment/envoy.md
      - FIPS 140-3 build: operations/fips.md
      - Request invariants: testing/request-invariants.md
  - Security:
      - v1.0 security review: security/v1.0-review.md
